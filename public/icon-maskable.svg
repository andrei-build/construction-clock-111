<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- INSTALL-PWA-40: maskable-иконка Marvel. Фон на всю площадь (без скруглений — их
       делает системная маска), содержимое в безопасной зоне (центр ~60%), чтобы Android
       не обрезал эмблему при круглой/сквиркл-маске. -->
  <rect width="100" height="100" fill="#0f1420"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#3fae7a" stroke-width="5"/>
  <line x1="50" y1="50" x2="50" y2="35" stroke="#3fae7a" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="61" y2="56" stroke="#f5a524" stroke-width="5" stroke-linecap="round"/>
</svg>
