<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ICON-MARVEL-41: maskable-версия эмблемы «MC». Фон на всю площадь БЕЗ скруглений
       (маску рисует система), монограмма в безопасной зоне ~центр 60%, чтобы круглая /
       сквиркл-маска Android не обрезала буквы. -->
  <rect width="100" height="100" fill="#0e1b16"/>
  <text x="50" y="62" text-anchor="middle"
        font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-weight="800" font-size="34" letter-spacing="-2"><tspan fill="#ffffff">M</tspan><tspan fill="#3fae7a">C</tspan></text>
</svg>
