<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ICON-MARVEL-41: строгий леттермарк «MC» (Marvel Construction). Скруглённый квадрат,
       тёмно-зелёный фон под тему приложения, монограмма (M белая, C акцент-зелёный).
       Никаких «часов»/стрелок. Читается на 16px и на 512px. -->
  <rect width="100" height="100" rx="22" fill="#0e1b16"/>
  <text x="50" y="66" text-anchor="middle"
        font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-weight="800" font-size="46" letter-spacing="-3"><tspan fill="#ffffff">M</tspan><tspan fill="#3fae7a">C</tspan></text>
</svg>
